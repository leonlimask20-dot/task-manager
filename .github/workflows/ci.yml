name: CI — Task Manager

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  testes-frontend:
    name: Testes Frontend (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        working-directory: frontend
        run: npm install

      - name: Executar testes
        working-directory: frontend
        run: npm test

  validacao-backend:
    name: Validação Backend (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        working-directory: backend
        run: npm install

      - name: Verificar sintaxe do servidor
        working-directory: backend
        run: node --check server.js && node --check routes/tasks.js && echo "Sintaxe OK"
